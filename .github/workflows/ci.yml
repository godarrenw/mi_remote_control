name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: 工具链信息
        run: swiftc --version && xcodebuild -version && sw_vers
      - name: 构建
        run: ./build.sh
      - name: 自检
        run: .build/miremote --self-test
